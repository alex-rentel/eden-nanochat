version: 2

updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Detroit
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - python
    groups:
      runtime:
        patterns:
          - mlx
          - tiktoken
          - numpy
          - requests
          - pyarrow
          - tokenizers
      dev:
        patterns:
          - pytest*
          - ruff
          - pyright

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - github-actions
