name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    # Fast static-only lint on Linux — ruff doesn't need MLX installed
    # (Apple-Silicon-only), so we get sub-30s feedback before paying for
    # the macos-14 matrix below.
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check nanochat_mlx/ tests/ scripts/

  test:
    name: pytest macOS ARM py${{ matrix.python-version }}
    needs: lint
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/pip
          key: pip-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            pip-${{ runner.os }}-${{ matrix.python-version }}-

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Show environment
        run: python --version

      - name: Lint (ruff)
        run: ruff check nanochat_mlx/ tests/ scripts/

      - name: Type-check (pyright)
        run: pyright

      - name: Run tests
        run: python -m pytest tests/ -q
